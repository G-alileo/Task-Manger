# Development Docker Compose with Hot Reload
# Use this for local development with volume mounting for code changes

version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: taskmanager_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${DB_NAME:-taskmanager_dev}
      MYSQL_USER: ${DB_USER:-taskmanager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-devpassword}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data_dev:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - taskmanager_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-devpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: taskmanager_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - taskmanager_network
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend (Development mode)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        PYTHON_VERSION: 3.12
    container_name: taskmanager_backend_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=task_manager.settings
    volumes:
      - .:/app  # Mount code for hot reload
      - /app/__pycache__  # Exclude pycache
      - /app/.pytest_cache  # Exclude pytest cache
    ports:
      - "8000:8000"
    networks:
      - taskmanager_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  mysql_data_dev:
    name: taskmanager_mysql_data_dev
  redis_data_dev:
    name: taskmanager_redis_data_dev

networks:
  taskmanager_network:
    name: taskmanager_network_dev
    driver: bridge
