openapi: 3.0.3
info:
  title: Task Manager API
  version: 1.0.0
  description: API documentation for Task Manager application
paths:
  /api/users/list/:
    get:
      operationId: users_list_list
      description: Retrieve a paginated list of all users. Only accessible by admin
        users.
      summary: List all users
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
              examples:
                SuccessResponse:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - status: success
                      count: 25
                      next: http://localhost:8000/api/users/list/?page=2
                      previous: null
                      results:
                      - id: 1
                        email: user@example.com
                        username: johndoe
                        first_name: John
                        last_name: Doe
                        full_name: John Doe
                        is_active: true
                        is_staff: false
                  summary: Success Response
          description: List of users retrieved successfully
        '401':
          description: Authentication credentials not provided
        '403':
          description: Permission denied - admin access required
  /api/users/login/:
    post:
      operationId: users_login_create
      description: Authenticate user with email and password. Returns JWT tokens on
        success.
      summary: User login
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Login successful
        '400':
          description: Invalid credentials
  /api/users/profile/:
    get:
      operationId: users_profile_retrieve
      description: Retrieve the authenticated user's profile information.
      summary: Get user profile
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                SuccessResponse:
                  value:
                    status: success
                    data:
                      id: 1
                      email: user@example.com
                      username: johndoe
                      first_name: John
                      last_name: Doe
                      full_name: John Doe
                      profile_picture: https://example.com/profile.jpg
                      bio: Software developer and task management enthusiast
                      is_active: true
                      is_staff: false
                      created_at: '2025-12-19T10:00:00Z'
                      updated_at: '2025-12-19T10:00:00Z'
                  summary: Success Response
          description: Profile retrieved successfully
        '401':
          description: Authentication credentials not provided
    put:
      operationId: users_profile_update
      description: Update the authenticated user's profile information (first_name,
        last_name, bio, profile_picture).
      summary: Update user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                SuccessResponse:
                  value:
                    status: success
                    message: Profile updated successfully
                    data:
                      id: 1
                      email: user@example.com
                      username: johndoe
                      first_name: John
                      last_name: Doe
                      full_name: John Doe
                      profile_picture: https://example.com/new-profile.jpg
                      bio: Updated bio
                      is_active: true
                      is_staff: false
                  summary: Success Response
          description: Profile updated successfully
        '400':
          description: Validation error
        '401':
          description: Authentication credentials not provided
    patch:
      operationId: users_profile_partial_update
      description: Partially update the authenticated user's profile information.
      summary: Partially update user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: Profile updated successfully
        '400':
          description: Validation error
        '401':
          description: Authentication credentials not provided
  /api/users/register/:
    post:
      operationId: users_register_create
      description: Create a new user account with email, username, and password.
      summary: Register a new user
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                SuccessResponse:
                  value:
                    status: success
                    message: User registered successfully
                    data:
                      id: 1
                      email: user@example.com
                      username: johndoe
                      first_name: John
                      last_name: Doe
                      full_name: John Doe
                      profile_picture: null
                      bio: ''
                      is_active: true
                      is_staff: false
                      created_at: '2025-12-19T10:00:00Z'
                      updated_at: '2025-12-19T10:00:00Z'
                  summary: Success Response
          description: User successfully registered
        '400':
          description: Validation error
  /api/users/token/refresh/:
    post:
      operationId: users_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    LoginRequest:
      type: object
      description: |-
        Serializer for user authentication.

        Validates user credentials (email/password) and issues JWT tokens upon success.
        Returns access and refresh tokens for authenticated sessions.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: User email address for authentication
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: User password
      required:
      - email
      - password
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedProfileRequest:
      type: object
      description: |-
        Serializer for updating user profile information.

        Allows authenticated users to update their optional profile fields.
        Email and username cannot be changed through this serializer.
      properties:
        first_name:
          type: string
          description: Optional. User's first name.
          maxLength: 150
        last_name:
          type: string
          description: Optional. User's last name.
          maxLength: 150
        profile_picture:
          type: string
          format: uri
          nullable: true
          description: Optional. URL to user's profile picture. Can be updated to
            ImageField for file uploads.
          maxLength: 500
        bio:
          type: string
          description: Optional. Short biography or description about the user.
          maxLength: 500
    ProfileRequest:
      type: object
      description: |-
        Serializer for updating user profile information.

        Allows authenticated users to update their optional profile fields.
        Email and username cannot be changed through this serializer.
      properties:
        first_name:
          type: string
          description: Optional. User's first name.
          maxLength: 150
        last_name:
          type: string
          description: Optional. User's last name.
          maxLength: 150
        profile_picture:
          type: string
          format: uri
          nullable: true
          description: Optional. URL to user's profile picture. Can be updated to
            ImageField for file uploads.
          maxLength: 500
        bio:
          type: string
          description: Optional. Short biography or description about the user.
          maxLength: 500
    RegisterRequest:
      type: object
      description: |-
        Serializer for user registration.

        Handles new user account creation with email, username, and password.
        Validates email uniqueness, strong password requirements, and password confirmation.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          title: Email address
          description: Required. Used as the primary login identifier.
          maxLength: 255
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Unique identifier.
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: Password must be strong and meet validation requirements
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
          description: Must match the password field
        first_name:
          type: string
          description: Optional. User's first name.
          maxLength: 150
        last_name:
          type: string
          description: Optional. User's last name.
          maxLength: 150
      required:
      - email
      - password
      - password_confirm
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    User:
      type: object
      description: |-
        Read-only serializer for user data representation.

        Used for displaying user information in API responses.
        Excludes sensitive fields like password and includes computed fields.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
          description: Required. Used as the primary login identifier.
        username:
          type: string
          description: Required. 150 characters or fewer. Unique identifier.
          maxLength: 150
        first_name:
          type: string
          description: Optional. User's first name.
          maxLength: 150
        last_name:
          type: string
          description: Optional. User's last name.
          maxLength: 150
        full_name:
          type: string
          description: User's full name (first_name + last_name)
          readOnly: true
        profile_picture:
          type: string
          format: uri
          nullable: true
          description: Optional. URL to user's profile picture. Can be updated to
            ImageField for file uploads.
          maxLength: 500
        bio:
          type: string
          description: Optional. Short biography or description about the user.
          maxLength: 500
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into the admin site.
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Date joined
          description: Timestamp when the user account was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Last updated
          description: Timestamp when the user account was last modified.
      required:
      - created_at
      - email
      - full_name
      - id
      - is_active
      - is_staff
      - updated_at
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
