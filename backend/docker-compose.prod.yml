version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: taskmanager_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
      - ./backups:/backups  # For database backups
    networks:
      - taskmanager_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=512M
      --innodb_log_file_size=128M
      --innodb_flush_log_at_trx_commit=2
      --slow_query_log=1
      --slow_query_log_file=/var/lib/mysql/slow-query.log
      --long_query_time=2
    # Don't expose ports in production - use internal network only
    # ports:
    #   - "3306:3306"

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: taskmanager_redis_prod
    restart: always
    networks:
      - taskmanager_network
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose ports in production
    # ports:
    #   - "6379:6379"

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.12
    container_name: taskmanager_backend_prod
    restart: always
    env_file:
      - .env.prod  # Use production environment file
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - DJANGO_SETTINGS_MODULE=task_manager.settings
    volumes:
      - staticfiles:/app/staticfiles:ro  # Read-only in production
      - media:/app/media
      - logs:/app/logs
    networks:
      - taskmanager_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Use reverse proxy (nginx) instead of exposing directly
    expose:
      - "8000"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/staticfiles:ro
      - media:/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certificates
      - ./nginx/logs:/var/log/nginx
    networks:
      - taskmanager_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    name: taskmanager_mysql_data_prod
    driver: local
  redis_data:
    name: taskmanager_redis_data_prod
    driver: local
  staticfiles:
    name: taskmanager_staticfiles_prod
    driver: local
  media:
    name: taskmanager_media_prod
    driver: local
  logs:
    name: taskmanager_logs_prod
    driver: local

networks:
  taskmanager_network:
    name: taskmanager_network_prod
    driver: bridge
